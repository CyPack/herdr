# =============================================================================
# KITTY TERMINAL CONFIGURATION
# =============================================================================
# Author: Ayaz
# Purpose: Mouse-first, image preview optimized terminal setup
# Date: 2025-01-28
#
# Kitty replaces tmux/zellij with native tabs and splits.
# This config is optimized for:
#   - Full mouse support
#   - Kitty graphics protocol (for Yazi image preview)
#   - Developer workflow with multiple tabs/windows
# =============================================================================

# -----------------------------------------------------------------------------
# SESSION - Auto-load tabs on startup
# -----------------------------------------------------------------------------
# Session dosyası: ~/.config/kitty/sessions/default.session
# Düzenlemek için: v ~/.config/kitty/sessions/default.session
startup_session ~/.config/kitty/sessions/default.session

# -----------------------------------------------------------------------------
# FONTS
# -----------------------------------------------------------------------------
# Nerd Font required for icons in Yazi, Starship, Neovim, etc.
# Download: https://www.nerdfonts.com/font-downloads

font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Font rendering
adjust_line_height  0
adjust_column_width 0
disable_ligatures   never

# -----------------------------------------------------------------------------
# CURSOR
# -----------------------------------------------------------------------------
cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
shell_integration     enabled

# -----------------------------------------------------------------------------
# SCROLLBACK
# -----------------------------------------------------------------------------
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# -----------------------------------------------------------------------------
# MOUSE
# -----------------------------------------------------------------------------
# Full mouse support - critical for this setup
mouse_hide_wait 3.0
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
copy_on_select yes
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#

# Click actions
click_interval -1.0
focus_follows_mouse no
pointer_shape_when_grabbed arrow
default_pointer_shape beam
pointer_shape_when_dragging beam

# Mouse actions - enable copy/paste with mouse
mouse_map left click ungrabbed mouse_handle_click selection link prompt
mouse_map shift+left click grabbed,ungrabbed mouse_handle_click selection link prompt
mouse_map super+left release grabbed,ungrabbed mouse_handle_click link
mouse_map super+left press grabbed discard_event
mouse_map middle release ungrabbed paste_from_selection
mouse_map left press ungrabbed mouse_selection normal
mouse_map ctrl+alt+left press ungrabbed mouse_selection rectangle
mouse_map left doublepress ungrabbed mouse_selection word
mouse_map left triplepress ungrabbed mouse_selection line
mouse_map ctrl+alt+left triplepress ungrabbed mouse_selection line_from_point
mouse_map right press ungrabbed paste_from_selection
mouse_map shift+middle release ungrabbed,grabbed paste_selection
mouse_map shift+middle press grabbed discard_event
mouse_map shift+left press ungrabbed,grabbed mouse_selection normal
mouse_map super+alt+left press ungrabbed,grabbed mouse_selection rectangle
mouse_map shift+left doublepress ungrabbed,grabbed mouse_selection word
mouse_map shift+left triplepress ungrabbed,grabbed mouse_selection line
mouse_map super+alt+left triplepress ungrabbed,grabbed mouse_selection line_from_point
mouse_map shift+right press ungrabbed,grabbed mouse_selection extend

# -----------------------------------------------------------------------------
# PERFORMANCE
# -----------------------------------------------------------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# -----------------------------------------------------------------------------
# TERMINAL BELL
# -----------------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab "* "
command_on_bell none

# -----------------------------------------------------------------------------
# WINDOW LAYOUT
# -----------------------------------------------------------------------------
remember_window_size  yes
initial_window_width  1200
initial_window_height 800
enabled_layouts tall,stack,fat,grid,splits,horizontal,vertical

# Window appearance
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 1pt
draw_minimal_borders yes
window_margin_width 0
single_window_margin_width -1
window_padding_width 5
placement_strategy center
active_border_color #89b4fa
inactive_border_color #6c7086
bell_border_color #f9e2af
inactive_text_alpha 0.8
hide_window_decorations no
resize_debounce_time 0.1
resize_draw_strategy static
resize_in_steps no
visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
confirm_os_window_close -1

# -----------------------------------------------------------------------------
# TAB BAR
# -----------------------------------------------------------------------------
tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style powerline
tab_bar_align left
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " | "
tab_powerline_style slanted
tab_activity_symbol *
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_title_template none
active_tab_font_style   bold
inactive_tab_font_style normal

# Tab colors (will be overridden by theme)
active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
tab_bar_background      #1e1e2e

# -----------------------------------------------------------------------------
# COLOR SCHEME
# -----------------------------------------------------------------------------
# Using Catppuccin Mocha - can be changed via: kitty +kitten themes
# To apply a theme, run: kitty +kitten themes

# Catppuccin Mocha colors (inline for immediate use)
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Black
color0  #45475a
color8  #585b70
# Red
color1  #f38ba8
color9  #f38ba8
# Green
color2  #a6e3a1
color10 #a6e3a1
# Yellow
color3  #f9e2af
color11 #f9e2af
# Blue
color4  #89b4fa
color12 #89b4fa
# Magenta
color5  #f5c2e7
color13 #f5c2e7
# Cyan
color6  #94e2d5
color14 #94e2d5
# White
color7  #bac2de
color15 #a6adc8

# Cursor colors
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# URL color
url_color               #89b4fa

# Marks (for selecting text)
mark1_foreground #1e1e2e
mark1_background #87b0f9
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# -----------------------------------------------------------------------------
# ADVANCED
# -----------------------------------------------------------------------------
shell .
editor .
close_on_child_death no
allow_remote_control yes
listen_on unix:@kitty
update_check_interval 0
# Super-devri + herdr autostart (2026-07-12, LOCAL-C4): kitty açılışında herdr.
# Geri alma: bu satırı "startup_session none" yap. (Not: satır 20'deki eski
# default.session ataması bu satır tarafından ezilir — kitty'de son değer kazanır.)
startup_session ~/.config/kitty/sessions/herdr.session
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 512
allow_hyperlinks yes
shell_integration enabled
term xterm-kitty

# -----------------------------------------------------------------------------
# OS SPECIFIC (Linux/GNOME)
# -----------------------------------------------------------------------------
linux_display_server auto
wayland_titlebar_color system
wayland_enable_ime yes

# -----------------------------------------------------------------------------
# KEYBOARD SHORTCUTS
# -----------------------------------------------------------------------------
# Clear all default shortcuts first (optional - uncomment if you want full control)
# clear_all_shortcuts yes

kitty_mod super

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map ctrl+shift+a pipe @text none wl-copy
map shift+insert paste_from_selection

# Scrolling
map kitty_mod+up        scroll_line_up
map kitty_mod+down      scroll_line_down
map kitty_mod+page_up   scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home      scroll_home
map kitty_mod+end       scroll_end
map kitty_mod+h         show_scrollback

# Window management (replaces tmux panes)
map kitty_mod+enter new_window
map kitty_mod+n new_os_window
map kitty_mod+w close_window
map kitty_mod+] next_window
map kitty_mod+[ previous_window
map kitty_mod+f move_window_forward
map kitty_mod+b move_window_backward
map kitty_mod+` move_window_to_top
map kitty_mod+r start_resizing_window

# Tab management (replaces tmux windows)
map kitty_mod+t new_tab
map kitty_mod+q close_tab
map kitty_mod+right next_tab
map kitty_mod+left  previous_tab
map kitty_mod+. move_tab_forward
map kitty_mod+, move_tab_backward
map kitty_mod+alt+t set_tab_title
map super+tab next_tab
map super+shift+tab previous_tab
# super+1..9 herdr'a devredildi (2026-07-12, LOCAL-C4) — herdr tab geçişi kullanıyor.
# kitty tab'ları için kitty_mod+alt+1..9 aşağıda duruyor. Geri almak için #'ları kaldır.
#map super+1 goto_tab 1
#map super+2 goto_tab 2
#map super+3 goto_tab 3
#map super+4 goto_tab 4
#map super+5 goto_tab 5
#map super+6 goto_tab 6
#map super+7 goto_tab 7
#map super+8 goto_tab 8
#map super+9 goto_tab 9
# ★ SUPER-DEVRİ KÖK-NEDEN FIX (2026-07-12): kitty_mod=super olduğu için kitty'nin
# default'ları + yukarıdaki kitty_mod+t/w map'leri super+t ve super+w'yi YUTUYORDU
# (super+t=new_tab, super+w=close_window olarak). no_op = kitty yakalamaz, tuşu
# İÇİNDEKİ PROGRAMA (herdr) GEÇİRİR (man kitty.conf, no_op). Kitty'de SON tanım
# kazanır — bu blok bilinçli olarak üstteki tanımları ezer. Geri almak için sil.
map super+t no_op
map super+w no_op
map super+1 no_op
map super+2 no_op
map super+3 no_op
map super+4 no_op
map super+5 no_op
map super+6 no_op
map super+7 no_op
map super+8 no_op
map super+9 no_op
map kitty_mod+alt+1 goto_tab 1
map kitty_mod+alt+2 goto_tab 2
map kitty_mod+alt+3 goto_tab 3
map kitty_mod+alt+4 goto_tab 4
map kitty_mod+alt+5 goto_tab 5
map kitty_mod+alt+6 goto_tab 6
map kitty_mod+alt+7 goto_tab 7
map kitty_mod+alt+8 goto_tab 8
map kitty_mod+alt+9 goto_tab 9

# Layout management
map kitty_mod+l next_layout
map kitty_mod+z toggle_layout stack

# Font size
map kitty_mod+equal     change_font_size all +1.0
map kitty_mod+minus     change_font_size all -1.0
map kitty_mod+backspace change_font_size all 0

# Select and act on visible text
map kitty_mod+e open_url_with_hints
map kitty_mod+p>f kitten hints --type path --program -
map kitty_mod+p>shift+f kitten hints --type path
map kitty_mod+p>l kitten hints --type line --program -
map kitty_mod+p>w kitten hints --type word --program -
map kitty_mod+p>h kitten hints --type hash --program -
map kitty_mod+p>n kitten hints --type linenum

# Miscellaneous
map kitty_mod+f11 toggle_fullscreen
map kitty_mod+f10 toggle_maximized
map kitty_mod+u    kitten unicode_input
map kitty_mod+f2   edit_config_file
map kitty_mod+escape kitty_shell window
map kitty_mod+a>m set_background_opacity +0.1
map kitty_mod+a>l set_background_opacity -0.1
map kitty_mod+a>1 set_background_opacity 1
map kitty_mod+a>d set_background_opacity default
map kitty_mod+delete clear_terminal reset active
map kitty_mod+f5 load_config_file

# -----------------------------------------------------------------------------
# CUSTOM SHORTCUTS FOR THIS SETUP
# -----------------------------------------------------------------------------
# Quick launch apps
map kitty_mod+g launch --type=tab lazygit
map kitty_mod+y launch --type=tab fish -c 'yazi; exec fish'
map kitty_mod+m launch --type=tab btop

# Split windows (Ghostty-style: d=dikey, s=yatay)
map kitty_mod+d launch --location=vsplit
map kitty_mod+s launch --location=hsplit
map kitty_mod+\ launch --location=vsplit
map kitty_mod+- launch --location=hsplit

# Focus windows with vim-like keys
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+h neighboring_window left
map kitty_mod+l neighboring_window right

# Broadcast input to all windows in tab (like tmux synchronize-panes)
map kitty_mod+b>i launch --allow-remote-control kitty +kitten broadcast

# -----------------------------------------------------------------------------
# INCLUDES
# -----------------------------------------------------------------------------
# Include theme file if exists (for easy theme switching)
# Run: kitty +kitten themes
# include current-theme.conf
